services:

  # Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # OTEL 자체 metrics
      - "8889:8889"   # Prometheus
    volumes:
      - /:/hostfs:ro  # hostmetrics
      - ../../monitoring/otel-config.yml:/etc/otel/config.yaml
    command: [ "--config=/etc/otel/config.yaml" ]
    depends_on:
      - jaeger-collector

  # Metrics
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--log.level=debug"
    restart: unless-stopped

  # Logs
  loki:
    image: grafana/loki:3.5.3
    ports:
      - "3100:3100"
    volumes:
      - ../../monitoring/loki.yml:/etc/loki/config.yaml

  # Traces
  jaeger-collector:
    image: jaegertracing/jaeger-collector:1.57
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=${ES_SERVER_URLS}
      - ES_TLS_ENABLE=false
      - ES_INDEX_ROLLOVER_ENABLE=true
    ports:
      - "14250:14250"

  jaeger-query:
    image: jaegertracing/jaeger-query:1.57
    container_name: jaeger-query
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=${ES_SERVER_URLS}
    ports:
      - "16686:16686"

  # Visualization
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../../monitoring/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped

volumes:
  grafana-storage: