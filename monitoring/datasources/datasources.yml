apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-datasource
    url: ${GRAFANA_PROMETHEUS_DATA_SOURCE}
    access: proxy
    isDefault: true
    version: 1
    editable: true

  - name: Loki
    type: loki
    uid: loki-datasource
    url: ${GRAFANA_LOKI_DATA_SOURCE}
    access: proxy
    version: 1
    editable: true

  - name: Jaeger
    type: jaeger
    uid: jaeger-datasource
    url: ${GRAFANA_JAEGER_DATA_SOURCE}
    access: proxy
    version: 1
    editable: true