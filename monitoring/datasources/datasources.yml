apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-datasource
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    version: 1
    editable: true

  - name: Loki
    type: loki
    uid: loki-datasource
    url: http://loki:3100
    access: proxy
    version: 1
    editable: true

  - name: Jaeger
    type: jaeger
    uid: jaeger-datasource
    url: http://jaeger-query:16686
    access: proxy
    version: 1
    editable: true