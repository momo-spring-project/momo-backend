spring:
  application:
    name: momo

  profiles:
    active: auth

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP 커넥션 풀 설정 (중간 규모 트래픽 최적화)
    hikari:
      # 커넥션 풀 크기
      minimum-idle: 10              # 최소 유지 커넥션
      maximum-pool-size: 20         # 최대 커넥션 (개발/중간 규모에 적합)

      # 타임아웃 설정
      connection-timeout: 20000     # 20초 (커넥션 대기 시간)
      idle-timeout: 600000          # 10분 (유휴 커넥션 유지 시간)
      max-lifetime: 1800000         # 30분 (커넥션 최대 생존 시간)

      # 모니터링 및 안정성
      leak-detection-threshold: 30000 # 30초 (커넥션 누수 감지)
      validation-timeout: 3000      # 3초 (커넥션 검증 시간)

      # MySQL 8.0 호환 초기화 SQL (NO_AUTO_CREATE_USER 제거)
      connection-init-sql: "SET SESSION sql_mode='STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION'"

      # MySQL 최적화 설정
      data-source-properties:
        # PreparedStatement 캐시 최적화
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true

        # 배치 처리 최적화 (QueryDSL과 JPA 배치 처리에 유리)
        rewriteBatchedStatements: true
        useLocalSessionState: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false

        # 네트워크 및 타임아웃 설정
        connectTimeout: 15000
        socketTimeout: 300000

        # 문자셋 및 지역화 (한국 시간대)
        characterEncoding: UTF-8
        useUnicode: true
        serverTimezone: Asia/Seoul

        # 보안 설정
        useSSL: false                # # TODO: 운영단계에서는 true로 변경
        allowPublicKeyRetrieval: true

        # 재연결 설정
        autoReconnect: true
        failOverReadOnly: false
        maxReconnects: 3

  jpa:
    hibernate:
      ddl-auto: none                # Flyway 사용으로 인한 DDL 비활성화
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        # MySQL Dialect 명시적 설정 (에러 해결)
        dialect: org.hibernate.dialect.MySQLDialect

        # SQL 로깅 (개발환경용)
        format_sql: true            # TODO: 운영단계에서는 false로 변경
        use_sql_comments: false

        # 배치 처리 최적화 (QueryDSL 대량 처리에 유리)
        jdbc:
          batch_size: 50
          batch_versioned_data: true
          order_inserts: true
          order_updates: true
          fetch_size: 50

        # 쿼리 최적화
        default_batch_fetch_size: 16  # N+1 문제 완화

        # 캐시 설정 (성능 최적화 - JCache 의존성 필요시 활성화)
        cache:
          use_second_level_cache: false
          use_query_cache: false

        # QueryDSL 최적화
        query:
          in_clause_parameter_padding: true
          plan_cache_max_size: 128

    show-sql: true

    # JPA 추가 설정
    open-in-view: false             # OSIV 비활성화 (성능 최적화)
    defer-datasource-initialization: true  # Flyway 이후 JPA 초기화

  flyway:
    enabled: true                    # Flyway 활성화
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true      # 마이그레이션 파일 변경 감지
    out-of-order: false           # 순서대로 실행 강제
    group: false                  # 트랜잭션 단위로 개별 실행 TODO: 운영단계에서는 true로 변경
    mixed: false                  # SQL과 Java 마이그레이션 혼용 방지
    clean-disabled: false         # TODO: 운영단계에서는 true로 변경 -> 가장 중요
    baseline-on-migrate: true

  messages:
    basename: validations, messages
    encoding: UTF-8

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: 0

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY}
    client-key: ${TOSS_CLIENT_KEY}
    base-url: ${TOSS_BASE_URL}

webclient:
  internal:
    secret-key: ${WEBCLIENT_SECRET_KEY}

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  metrics:
    export:
      otlp:
        enabled: true
        step: 5s
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      enabled: false
    logging:
      enabled: false

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
  traces:
    exporter: otlp
    sampler: always_on

logging:
  level:
    root: INFO
    com.example.momo: DEBUG
    io.opentelemetry.exporter: DEBUG


