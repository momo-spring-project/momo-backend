spring:
  application:
    name: momo

  profiles:
    active: auth

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true                    # Flyway 활성화
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true      # 마이그레이션 파일 변경 감지
    out-of-order: false           # 순서대로 실행 강제
    group: false                  # 트랜잭션 단위로 개별 실행
    mixed: false                  # SQL과 Java 마이그레이션 혼용 방지
    clean-disabled: false
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  messages:
    basename: validations, messages
    encoding: UTF-8

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    publisher-confirm-type: correlated

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: 0

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY}
    client-key: ${TOSS_CLIENT_KEY}
    base-url: ${TOSS_BASE_URL}

webclient:
  internal:
    secret-key: ${WEBCLIENT_SECRET_KEY}

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  metrics:
    export:
      otlp:
        enabled: true
        step: 5s
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      enabled: false
    logging:
      enabled: false

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
  traces:
    exporter: otlp
    sampler: always_on

logging:
  level:
    root: INFO
    com.example.momo: DEBUG
    io.opentelemetry.exporter: DEBUG

notification:
  slack:
    webhook:
      url: ${SLACK_WEBHOOK_URL}
