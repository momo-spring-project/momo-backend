version: "3.8"

# volumes {HostPath}:{DockerPath} -> : 왼쪽의 경로 파일을 : 오른쪽의 경로에 volume 으로 넣겠다
# command --{command} -> 컨테이너 시작될 때 실행할 명령, 설정
# depends_on -{service} -> 지정한 서비스 실행된 이후 실행
# environment -{변수}={값} -> 환경변수 설정

services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # OTEL 자체 metrics
      - "8889:8889"   # Prometheus
    volumes:
      - /:/hostfs:ro  # hostmetrics
      - ./monitoring/otel-config.yml:/etc/otel/config.yaml
    command: [ "--config=/etc/otel/config.yaml" ]
    depends_on:
      - jaeger-collector

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"

  # Metrics
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--log.level=debug"
    restart: unless-stopped

  # Traces
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --fail localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 3

  jaeger-collector:
    image: jaegertracing/jaeger-collector:1.57
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - ES_TLS_ENABLE=false
      - ES_INDEX_ROLLOVER_ENABLE=true
    ports:
      - "14250:14250"
    depends_on:
      elasticsearch:
        condition: service_healthy

  jaeger-query:
    image: jaegertracing/jaeger-query:1.57
    container_name: jaeger-query
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
    ports:
      - "16686:16686"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Logs
  loki:
    image: grafana/loki:3.5.3
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/config.yaml

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP (Spring에서 연결)
      - "15672:15672"   # RabbitMQ Web 관리 콘솔
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Visualization
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  grafana-storage:
  es-data:
  rabbitmq_data:
